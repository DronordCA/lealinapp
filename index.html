<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="subtitle">Patrimoine total</div>
    <div id="total" class="total">0 $</div>
    <div id="total-eur" class="secondary">0 €</div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- COMPTES -->
    <section id="accounts" class="grid"></section>

    <!-- SOLDE MOIS -->
    <section class="card">
      <div class="card-title">Solde ce mois</div>
      <div id="monthly" class="big">0 $</div>

      <div class="stats">
        <div class="pill green">
          <div>Reçus</div>
          <span id="received">0</span>
        </div>
        <div class="pill blue">
          <div>Fixes</div>
          <span id="fixed">0</span>
        </div>
        <div class="pill orange">
          <div>Variables</div>
          <span id="variable">0</span>
        </div>
      </div>
    </section>

    <!-- LISTE -->
    <section class="card">
      <div class="card-title">Historique</div>
      <ul id="list"></ul>
    </section>

  </main>

  <!-- NAV -->
  <nav class="nav">
    <button onclick="setTab('home')">Accueil</button>
    <button onclick="setTab('add')">Dépense</button>
    <button onclick="exportData()">Export</button>
    <input type="file" onchange="importData(event)" />
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
